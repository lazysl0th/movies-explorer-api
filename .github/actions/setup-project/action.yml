name: 'Setup Project Environment'
description: 'Clones the repo, configures Node.js, and installs dependencies with caching'

runs:
  using: 'composite'
  steps:
    - name: 🟢 Initialize Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    - name: 📦 Install Project Dependencies
      run: npm ci
      shell: bash
